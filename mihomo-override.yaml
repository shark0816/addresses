# Mihomo (Clash Meta) 修复版配置
# 修复了 Loop Detected 循环引用问题

proxy-groups:
  # 1. 核心汇总组（作为分流的总开关）
  - name: 🚀 节点选择
    type: select
    proxies: [♻️ 自动选择, ⚖️ 负载均衡, 🏁 香港节点, 🏁 台湾节点, 🏁 日本节点, 🏁 美国节点, DIRECT]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/select.png

  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true # 包含所有节点进行测速
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/auto.png

  - name: ⚖️ 负载均衡
    type: load-balance
    url: http://www.gstatic.com/generate_204
    interval: 300
    strategy: consistent-hashing
    include-all: true # 包含所有节点进行均衡
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/balance.png

  # 2. 区域分流组（注意：这里不再包含“🚀 节点选择”，避免循环）
  - name: 🏁 香港节点
    type: select
    include-all: true
    filter: "(?i)香港|HK|Hong Kong|HONGKONG"
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/hongkong.png

  - name: 🏁 台湾节点
    type: select
    include-all: true
    filter: "(?i)台湾|TW|Taiwan|TAIWAN"
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/taiwan.png

  - name: 🏁 日本节点
    type: select
    include-all: true
    filter: "(?i)日本|JP|Japan|JAPAN"
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/japan.png

  - name: 🏁 美国节点
    type: select
    include-all: true
    filter: "(?i)美国|US|USA|United States"
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/usa.png

  # 3. 业务应用组（引用“🚀 节点选择”或特定区域组）
  - name: 🤖 人工智能
    type: select
    proxies: [🚀 节点选择, 🏁 美国节点, 🏁 日本节点, 🏁 台湾节点]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/openai.png

  - name: 🎬 奈飞视频
    type: select
    proxies: [🚀 节点选择, 🏁 香港节点, 🏁 台湾节点, 🏁 美国节点]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/netflix.png

  - name: 📺 哔哩哔哩
    type: select
    proxies: [DIRECT, 🏁 台湾节点, 🏁 香港节点, 🚀 节点选择]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/bilibili.png

  - name: 📽️ 国内媒体
    type: select
    proxies: [DIRECT, 🚀 节点选择]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/chinatv.png

  - name: 📢 谷歌服务
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, DIRECT]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/google.png

  - name: ☁️ 谷歌FCM
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, DIRECT]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/fcm.png

  - name: Ⓜ️ 微软服务
    type: select
    proxies: [DIRECT, 🚀 节点选择]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/microsoft.png

  - name: 📧 微软云盘
    type: select
    proxies: [DIRECT, 🚀 节点选择]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/onedrive.png

  - name: 🍎 苹果服务
    type: select
    proxies: [DIRECT, 🚀 节点选择]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/apple.png

  - name: 📲 电报消息
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/telegram.png

  - name: 🐟 漏网之鱼
    type: select
    proxies: [🚀 节点选择, DIRECT]
    icon: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/backdrops/select.png

# 规则部分保持不变
